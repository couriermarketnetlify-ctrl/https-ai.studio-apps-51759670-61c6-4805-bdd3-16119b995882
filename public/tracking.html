<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tracking - Courier Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Courier Market</h1>
    <p>Track your package status below.</p>
  </header>

  <main>
    <form>
      <label>Tracking Number:</label><br>
      <input type="text" placeholder="Enter your tracking number" required><br><br>
      <button type="submit">Track Package</button>
    </form>

    <div id="tracking-result">
      <p>Tracking unavailable. No label has been created for this package.</p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Courier Market</p>
  </footer>
  <script src="tracking.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Courier Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Courier Market</h1>
    <p>Create your account to start generating labels.</p>
  </header>

  <main>
    <form>
      <label>Full Name:</label><br>
      <input type="text" placeholder="Enter your full name" required><br><br>

      <label>Email:</label><br>
      <input type="email" placeholder="Enter your email" required><br><br>

      <label>Password:</label><br>
      <input type="password" placeholder="Create a password" required><br><br>

      <button type="submit">Create Account</button>
    </form>
    <p>Already have an account? <a href="login.html">Login here</a></p>
  </main>

  <footer>
    <p>&copy; 2026 Courier Market</p>
  </footer>
</body>
</html>
